services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ewebworld
    ports:
      - "5432:5432"
    volumes:
      - ewebworld_pgdata:/var/lib/postgresql/data

volumes:
  ewebworld_pgdata:
